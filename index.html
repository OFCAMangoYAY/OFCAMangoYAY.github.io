<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Specs</title>
</head>
<body>
<h1>System Diagnostics</h1>
<p>Device Specs for Mango</p>
<hr>

<h3>Memory (RAM)</h3>
<p id="ram-val">Checking...</p>

<h3>Operating System</h3>
<p id="os-val">Checking...</p>

<h3>Browser</h3>
<p id="browser-name">Checking...</p>

<h3>Engine</h3>
<p id="engine-val">Checking...</p>

<hr>

<h3>Full User Agent</h3>
<p id="ua-val">Checking...</p>

<br>

<button onclick="location.reload()">Refresh Data</button>

<script>
    function runDiagnostics() {
        var ua = navigator.userAgent || "";
        
        // 1. RAM Detection
        try {
            if (navigator.deviceMemory) {
                document.getElementById('ram-val').innerText = navigator.deviceMemory + " GB (approx)";
            } else {
                document.getElementById('ram-val').innerText = "Restricted/Not Shared";
            }
        } catch (e) {
            document.getElementById('ram-val').innerText = "Error";
        }

        // 2. OS Detection
        var os = "Smart Device";
        if (ua.indexOf("Tizen") > -1) os = "Samsung Tizen TV";
        else if (ua.indexOf("Web0S") > -1 || ua.indexOf("WebOS") > -1) os = "LG WebOS";
        else if (ua.indexOf("Windows") > -1) os = "Windows";
        else if (ua.indexOf("Android") > -1) os = "Android / Google TV";
        else if (ua.indexOf("Linux") > -1) os = "Linux Base";
        
        document.getElementById('os-val').innerText = os;

        // 3. Browser Detection
        var browser = "Generic Browser";
        var engine = "WebKit/Blink";

        if (ua.indexOf("SamsungBrowser") > -1) browser = "Samsung Browser";
        else if (ua.indexOf("Chrome") > -1) browser = "Chrome-based";
        else if (ua.indexOf("Firefox") > -1) {
            browser = "Firefox";
            engine = "Gecko";
        } else if (ua.indexOf("Safari") > -1) browser = "Safari";

        document.getElementById('browser-name').innerText = browser;
        document.getElementById('engine-val').innerText = engine;
        document.getElementById('ua-val').innerText = ua;
    }

    window.onload = runDiagnostics;
</script>

<
    /body>
</html>
